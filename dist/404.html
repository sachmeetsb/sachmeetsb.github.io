<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Kartar AI Labs</title>
    <!--
      GitHub Pages SPA fallback — rafgraph/spa-github-pages single-redirect trick.
      Custom-domain ROOT deploy (kartar.ai) → pathSegmentsToKeep = 0.
      Encodes the requested deep path into a query string and redirects to the
      site root, where the matching restore snippet in index.html decodes it
      back via history.replaceState BEFORE React boots, so /work (etc.) resolves
      to the real route instead of a 404 shell.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
